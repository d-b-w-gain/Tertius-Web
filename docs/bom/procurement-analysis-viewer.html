<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procurement Analysis Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #020617;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid #1e293b;
      background: #0f172a;
    }
    h1 {
      margin: 0;
      font-size: 16px;
    }
    input {
      color: #cbd5e1;
      border: 1px solid #334155;
      background: #111827;
      border-radius: 6px;
      padding: 8px;
    }
    .view-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #020617;
    }
    .view-toggle button {
      width: auto;
      margin: 0;
      padding: 7px 10px;
      border-color: transparent;
      text-align: center;
      color: #93c5fd;
    }
    .view-toggle button.active {
      border-color: #f59e0b;
      background: #451a03;
      color: white;
    }
    main {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: calc(100vh - 63px);
    }
    aside {
      border-right: 1px solid #1e293b;
      background: #0b1120;
      padding: 14px;
      overflow: auto;
    }
    section {
      padding: 16px;
      overflow: auto;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .metric {
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 10px;
      background: #020617;
    }
    .metric span {
      display: block;
      color: #64748b;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
    }
    button {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      border: 1px solid #1e293b;
      border-radius: 6px;
      background: #111827;
      color: #dbeafe;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }
    button.active {
      border-color: #f59e0b;
      background: #451a03;
      color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid #1e293b;
      padding: 9px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #0f172a;
      color: #93c5fd;
      z-index: 1;
    }
    code {
      color: #fde68a;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
    }
    .empty {
      color: #94a3b8;
      padding: 28px;
      text-align: center;
    }
    .diagnostic {
      margin-bottom: 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #020617;
      padding: 10px;
    }
    .diagnostic strong {
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <header>
    <h1>Procurement Analysis Viewer</h1>
    <input id="file-input" type="file" accept="application/json,.json">
    <div class="view-toggle" role="group" aria-label="Main view">
      <button id="assembly-view-button" class="active" type="button">Assemblies</button>
      <button id="flat-view-button" type="button">Flat</button>
    </div>
  </header>
  <main>
    <aside>
      <div class="metric-grid">
        <div class="metric"><span>Assemblies</span><strong id="assembly-count">0</strong></div>
        <div class="metric"><span>Components</span><strong id="component-count">0</strong></div>
        <div class="metric"><span>Requirements</span><strong id="requirement-count">0</strong></div>
        <div class="metric"><span>Diagnostics</span><strong id="diagnostic-count">0</strong></div>
      </div>
      <div id="assembly-list"></div>
    </aside>
    <section>
      <div id="content" class="empty">Open a procurement_analysis.json file.</div>
    </section>
  </main>

  <script>
    const state = { analysis: null, selectedAssemblyId: "__all__", viewMode: "assemblies" };

    const byId = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;",
    }[char]));

    function normaliseAnalysis(raw) {
      if (Array.isArray(raw?.requirements)) return raw;
      if (!Array.isArray(raw?.line_items)) return raw;

      const assemblyId = "grouped-bom";
      const requirements = raw.line_items.map((line, index) => {
        const id = `grouped-${index + 1}`;
        return {
          id: `${id}.requirement`,
          component_id: id,
          assembly_id: assemblyId,
          part_number: line.part_number || null,
          stock_number: line.stock_number || null,
          quantity: Number(line.quantity || 0),
          rolled_up_quantity: Number(line.quantity || 0),
          quantity_source: line.quantity_source || "visual_instances",
          quantity_confidence: line.quantity_confidence || "verified",
          orderable: line.orderable !== false,
          visual_instance_count: Number(line.quantity || 0),
          source_call_count: line.visual_rows || line.source_call_count || 1,
          count_trace: { grouped_from_visual_rows: line.visual_rows || line.source_call_count || null },
          unit: line.unit || "each",
          dimensions: line.dimensions || {},
          material: line.material || null,
          finish: line.finish || null,
          source_trace: { source: raw.source || "grouped_line_items" },
          resolution_trace: {},
        };
      });
      const components = requirements.map((requirement) => ({
        id: requirement.component_id,
        label: requirement.part_number || "(missing part number)",
        path: `Grouped BoM/${requirement.part_number || "(missing part number)"}`,
        assembly_id: assemblyId,
        visual_node_ids: [],
        visual_instance_count: requirement.visual_instance_count,
      }));
      const diagnosticItems = Array.isArray(raw.diagnostics)
        ? raw.diagnostics
        : Object.entries(raw.diagnostics || {}).map(([code, value]) => ({
            code,
            severity: "info",
            message: String(value),
          }));

      return {
        ...raw,
        assemblies: [{ id: assemblyId, label: "Grouped BoM", path: "Grouped BoM", parent_id: null }],
        components,
        requirements,
        diagnostics: diagnosticItems,
      };
    }

    function requirementKey(requirement) {
      const dims = Object.entries(requirement.dimensions || {})
        .filter(([, value]) => value !== null && value !== undefined && String(value).trim() !== "")
        .sort(([left], [right]) => left.localeCompare(right))
        .map(([key, value]) => `${key}=${value}`)
        .join("|");
      return [
        requirement.part_number || "",
        requirement.unit || "each",
        dims,
        requirement.material || "",
        requirement.finish || "",
      ].join("::");
    }

    function displayName(requirement) {
      if (requirement.stock_number) return requirement.stock_number;
      const part = requirement.part_number || "(missing part number)";
      const length = Number(requirement.dimensions?.length_mm || 0);
      if (!length) return part;
      const code = length / 100;
      return `${part}x${Number.isInteger(code) ? code : code.toFixed(1).replace(/\\.0$/, "")}`;
    }

    function quantityEvidenceLabel(line) {
      const sourceLabels = {
        explicit: "explicit",
        visual_instances: "visual",
        source_calls: "source",
        unknown: "unknown",
      };
      const confidenceLabels = {
        verified: "verified",
        probable: "probable",
        diagnostic: "diagnostic",
      };
      const source = sourceLabels[line.quantity_source] || line.quantity_source || "unknown";
      const confidence = confidenceLabels[line.quantity_confidence] || line.quantity_confidence || "unknown";
      return `${confidence} · ${source}`;
    }

    function groupedRequirements(analysis, assemblyId, includeAssembly) {
      const components = new Map((analysis.components || []).map((component) => [component.id, component]));
      const assemblies = new Map((analysis.assemblies || []).map((assembly) => [assembly.id, assembly]));
      const groups = new Map();
      for (const requirement of analysis.requirements || []) {
        const component = components.get(requirement.component_id);
        const sourceAssemblyId = requirement.assembly_id || component?.assembly_id || "";
        if (assemblyId !== "__all__" && sourceAssemblyId !== assemblyId) continue;
        const key = requirementKey(requirement);
        if (!groups.has(key)) {
          groups.set(key, {
            key,
            display: displayName(requirement),
            part_number: requirement.part_number || "",
            quantity: 0,
            unit: requirement.unit || "each",
            dimensions: requirement.dimensions || {},
            components: [],
            assemblyIds: new Set(),
            assemblyLabels: new Set(),
            quantity_source: requirement.quantity_source || "unknown",
            quantity_confidence: requirement.quantity_confidence || "diagnostic",
            quantitySources: new Set(),
            quantityConfidences: new Set(),
            source: requirement.source_trace || {},
            resolution: requirement.resolution_trace || {},
          });
        }
        const group = groups.get(key);
        const quantityValue = assemblyId === "__all__"
          ? Number(requirement.rolled_up_quantity || requirement.quantity || 1)
          : Number(requirement.quantity || 1);
        group.quantity += quantityValue;
        group.components.push(requirement.component_id);
        group.quantitySources.add(requirement.quantity_source || "unknown");
        group.quantityConfidences.add(requirement.quantity_confidence || "diagnostic");
        if (group.quantityConfidences.has("diagnostic")) {
          group.quantity_confidence = "diagnostic";
        } else if (group.quantityConfidences.has("probable")) {
          group.quantity_confidence = "probable";
        } else {
          group.quantity_confidence = "verified";
        }
        if (group.quantitySources.size > 1) {
          group.quantity_source = "mixed";
        }
        if (includeAssembly && sourceAssemblyId) {
          group.assemblyIds.add(sourceAssemblyId);
          group.assemblyLabels.add(assemblies.get(sourceAssemblyId)?.label || sourceAssemblyId);
        }
      }
      return [...groups.values()]
        .map((group) => ({
          ...group,
          assemblyIds: [...group.assemblyIds],
          assemblyLabels: [...group.assemblyLabels],
          quantitySources: [...group.quantitySources],
          quantityConfidences: [...group.quantityConfidences],
        }))
        .sort((left, right) => left.display.localeCompare(right.display));
    }

    function render() {
      const analysis = state.analysis;
      if (!analysis) return;
      const isFlat = state.viewMode === "flat";
      const assemblies = analysis.assemblies || [];
      const components = analysis.components || [];
      const requirements = analysis.requirements || [];
      const diagnostics = analysis.diagnostics || [];
      byId("assembly-count").textContent = assemblies.length;
      byId("component-count").textContent = components.length;
      byId("requirement-count").textContent = requirements.length;
      byId("diagnostic-count").textContent = diagnostics.length;
      byId("assembly-view-button").classList.toggle("active", !isFlat);
      byId("flat-view-button").classList.toggle("active", isFlat);

      byId("assembly-list").innerHTML = [
        { id: "__all__", label: "Whole design" },
        ...assemblies,
      ].map((assembly) => `
        <button class="${assembly.id === state.selectedAssemblyId ? "active" : ""}" data-assembly-id="${escapeHtml(assembly.id)}">
          ${escapeHtml(assembly.label || assembly.id)}
        </button>
      `).join("");
      for (const button of byId("assembly-list").querySelectorAll("button")) {
        button.addEventListener("click", () => {
          state.selectedAssemblyId = button.dataset.assemblyId;
          render();
        });
      }

      const grouped = groupedRequirements(analysis, state.selectedAssemblyId, isFlat);
      const rows = grouped.map((line) => `
        <tr>
          <td><strong>${escapeHtml(line.display)}</strong><br><code>${escapeHtml(line.key)}</code></td>
          <td>${escapeHtml(line.quantity)} ${escapeHtml(line.unit)}<br><code>${escapeHtml(quantityEvidenceLabel(line))}</code></td>
          ${isFlat && state.selectedAssemblyId === "__all__" ? `<td>${escapeHtml(line.assemblyLabels.join(", ") || "Unassigned")}</td>` : ""}
          <td><code>${escapeHtml(JSON.stringify(line.dimensions))}</code></td>
          <td>${escapeHtml(line.components.join(", "))}</td>
          <td>
            ${escapeHtml(line.source.function || "")}<br>
            <code>${escapeHtml([line.source.source_file, line.source.source_line].filter(Boolean).join(":"))}</code>
          </td>
          <td><code>${escapeHtml(JSON.stringify(line.resolution.part_number || null))}</code></td>
        </tr>
      `).join("");

      const diagnosticsHtml = diagnostics.length ? `
        <h2>Diagnostics</h2>
        ${diagnostics.map((diagnostic) => `
          <div class="diagnostic">
            <strong>${escapeHtml(diagnostic.code || "diagnostic")}</strong>
            <div>${escapeHtml(diagnostic.message || "")}</div>
            ${diagnostic.component_id ? `<code>${escapeHtml(diagnostic.component_id)}</code>` : ""}
          </div>
        `).join("")}
      ` : "";

      byId("content").className = "";
      byId("content").innerHTML = grouped.length ? `
        <table>
          <thead>
            <tr>
              <th>Requirement</th>
              <th>Qty</th>
              ${isFlat && state.selectedAssemblyId === "__all__" ? "<th>Assemblies</th>" : ""}
              <th>Dimensions</th>
              <th>Components</th>
              <th>Source</th>
              <th>Resolution</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        ${diagnosticsHtml}
      ` : `<div class="empty">No grouped requirements for this ${isFlat ? "design" : "assembly"}.</div>${diagnosticsHtml}`;
    }

    byId("assembly-view-button").addEventListener("click", () => {
      state.viewMode = "assemblies";
      render();
    });

    byId("flat-view-button").addEventListener("click", () => {
      state.viewMode = "flat";
      render();
    });

    byId("file-input").addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      state.analysis = normaliseAnalysis(JSON.parse(text));
      state.selectedAssemblyId = "__all__";
      render();
    });
  </script>
</body>
</html>
