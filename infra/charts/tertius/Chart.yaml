apiVersion: v2
name: tertius
description: Helm chart for the Tertius API, UI, and supporting Kubernetes services.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: valkey
    version: 0.9.4
    repository: https://valkey.io/valkey-helm/
    condition: valkey.enabled
  - name: nats
    version: 2.14.2
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
