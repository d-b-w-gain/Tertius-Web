{{- if .Values.api.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tertius.apiName" . }}-cache
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  accessModes:
    {{- toYaml .Values.api.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.api.persistence.size | quote }}
  {{- if .Values.api.persistence.storageClassName }}
  storageClassName: {{ .Values.api.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
