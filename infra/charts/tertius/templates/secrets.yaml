{{- if .Values.app.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tertius.secretName" . }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.app.secret.databaseUrl | quote }}
  VALKEY_URL: {{ .Values.app.secret.valkeyUrl | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.app.secret.oidcClientSecret | quote }}
{{- end }}
{{- if .Values.app.llmSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-llm" (include "tertius.fullname" .)) .Values.app.llmSecretName | quote }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.app.llmSecret.apiKey | quote }}
{{- end }}
{{- if and .Values.postgres.enabled .Values.postgres.appUserSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.appUserSecretName }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.appUserSecret.username | quote }}
  password: {{ .Values.postgres.appUserSecret.password | quote }}
{{- end }}
{{- if and .Values.keycloak.enabled .Values.keycloak.database.appUserSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keycloak.database.appUserSecretName }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.keycloak.database.appUserSecret.username | quote }}
  password: {{ .Values.keycloak.database.appUserSecret.password | quote }}
{{- end }}
