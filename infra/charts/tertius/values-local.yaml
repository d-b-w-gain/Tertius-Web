app:
  environment: local
  observability:
    enabled: true
    otlpEndpoint: ""
    otlpProtocol: grpc
    tracesSampler: parentbased_traceidratio
    tracesSamplerArg: "1.0"
    logJson: true
    resourceAttributes: ""
    collectorHttpHost: ""
    collectorHttpPort: "4318"
  config:
    keycloakAudience: tertius-api
    keycloakIssuerUrl: http://keycloak.localhost/realms/tertius
    keycloakJwksUrlOverride: auto
    authCookieSecure: false
    authSessionIdleSeconds: 604800
    authSessionMaxSeconds: 2592000
    natsUrl: ""
    llmDefaultModelId: kimi-k2.7-code
    llmWeeklyBudgetUsd: "14.00"
    llmModels:
      - id: glm-5.2
        label: GLM-5.2
        model: glm-5.2
        endpoint: https://opencode.ai/zen/go/v1/chat/completions
        api: openai-chat-completions
        input_price_per_million: 1.40
        output_price_per_million: 4.40
        cached_read_price_per_million: 0.26
        cached_write_price_per_million: null
        enabled: true
      - id: kimi-k2.7-code
        label: Kimi K2.7 Code
        model: kimi-k2.7-code
        endpoint: https://opencode.ai/zen/go/v1/chat/completions
        api: openai-chat-completions
        input_price_per_million: 0.95
        output_price_per_million: 4.00
        cached_read_price_per_million: 0.19
        cached_write_price_per_million: null
        enabled: true
      - id: deepseek-v4-pro
        label: DeepSeek V4 Pro
        model: deepseek-v4-pro
        endpoint: https://opencode.ai/zen/go/v1/chat/completions
        api: openai-chat-completions
        input_price_per_million: 1.74
        output_price_per_million: 3.48
        cached_read_price_per_million: 0.0145
        cached_write_price_per_million: null
        enabled: true
      - id: minimax-m3
        label: MiniMax M3
        model: minimax-m3
        endpoint: https://opencode.ai/zen/go/v1/messages
        api: anthropic-messages
        input_price_per_million: 0.30
        output_price_per_million: 1.20
        cached_read_price_per_million: 0.06
        cached_write_price_per_million: null
        enabled: true
    llmTimeoutSeconds: 480
    llmMaxOutputTokens: 2048
    llmFileEditMaxOutputTokens: 65536
    llmFileEditMaxContextFiles: 20
    llmFileEditMaxContextChars: 80000
    llmUserRateLimitPerMinute: 10
    llmTenantRateLimitPerMinute: 60
    llmTenantDailyTokenQuota: "3200000"
    llmUserDailyTokenQuota: "3200000"
    billingStreamName: TERTIUS_BILLING
    billingLlmUsageSubject: tertius.billing.usage.llm.tokens
    billingMaxBytes: 262144
    oidcIssuerUrl: http://localhost:8081/realms/tertius
  llmSecretName: ""
  llmSecret:
    create: false
    apiKey: ""
    fileEditSystemPrompt: ""
  secret:
    create: true
    databaseUrl: ""
    valkeyUrl: redis://tertius-valkey:6379/0
    authSessionSecret: local-auth-session-secret-change-me

api:
  replicaCount: 1
  image:
    repository: localhost/tertius-api
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

compileJobs:
  runtimeClassName: ""
  maxReplicaCount: 1
  activeDeadlineSeconds: 720
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "4"
      memory: 8Gi
      ephemeral-storage: 4Gi

ui:
  replicaCount: 1
  image:
    repository: localhost/tertius-ui
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  instances: 1
  appUserSecret:
    create: true
    password: tertius-local-password
  storage:
    size: 2Gi
    storageClass: local-path

keycloak:
  instances: 1
  hostname: http://keycloak.localhost
  adminHostname: http://keycloak.localhost
  database:
    instances: 1
    appUserSecret:
      create: true
      password: keycloak-local-password
    storage:
      size: 2Gi
      storageClass: local-path
  realmImport:
    enabled: true
    uiPublicClient: true
    uiDirectAccessGrantsEnabled: true
    smokeUser:
      enabled: true

cloudflared:
  enabled: false
  replicaCount: 1

valkey:
  dataStorage:
    enabled: true
    requestedSize: 1Gi
    className: local-path
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

nats:
  config:
    merge:
      max_payload: 33554432
    jetstream:
      fileStore:
        pvc:
          size: 1Gi
          storageClassName: local-path
  container:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
