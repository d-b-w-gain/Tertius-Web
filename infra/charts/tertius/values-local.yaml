app:
  environment: local
  config:
    keycloakAudience: tertius-api
    keycloakIssuerUrl: http://keycloak.localhost/realms/tertius
    keycloakJwksUrlOverride: auto
    natsUrl: ""
    llmBaseUrl: https://api.deepseek.com
    llmModel: deepseek-v4-flash
    llmTimeoutSeconds: 60
    llmMaxOutputTokens: 2048
    llmUserRateLimitPerMinute: 10
    llmTenantRateLimitPerMinute: 60
    llmTenantDailyTokenQuota: 100000
    llmUserDailyTokenQuota: 25000
    billingStreamName: TERTIUS_BILLING
    billingLlmUsageSubject: tertius.billing.usage.llm.tokens
    billingMaxBytes: 262144
    oidcIssuerUrl: http://localhost:8081/realms/tertius
  llmSecretName: ""
  llmSecret:
    create: false
    apiKey: ""
    fileEditSystemPrompt: ""
  secret:
    create: true
    databaseUrl: ""
    valkeyUrl: redis://tertius-valkey:6379/0

api:
  replicaCount: 1
  image:
    repository: localhost/tertius-api
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

compileJobs:
  runtimeClassName: ""
  maxReplicaCount: 1
  activeDeadlineSeconds: 720
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "4"
      memory: 8Gi
      ephemeral-storage: 4Gi

ui:
  replicaCount: 1
  image:
    repository: localhost/tertius-ui
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  instances: 1
  appUserSecret:
    create: true
    password: tertius-local-password
  storage:
    size: 2Gi
    storageClass: local-path

keycloak:
  instances: 1
  hostname: http://keycloak.localhost
  adminHostname: http://keycloak.localhost
  database:
    instances: 1
    appUserSecret:
      create: true
      password: keycloak-local-password
    storage:
      size: 2Gi
      storageClass: local-path
  realmImport:
    enabled: true
    uiDirectAccessGrantsEnabled: true
    smokeUser:
      enabled: true

cloudflared:
  enabled: false
  replicaCount: 1

valkey:
  dataStorage:
    enabled: true
    requestedSize: 1Gi
    className: local-path
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

nats:
  config:
    merge:
      max_payload: 33554432
    jetstream:
      fileStore:
        pvc:
          size: 1Gi
          storageClassName: local-path
  container:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
