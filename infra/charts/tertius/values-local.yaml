app:
  environment: local
  observability:
    enabled: true
    otlpEndpoint: ""
    otlpProtocol: grpc
    tracesSampler: parentbased_traceidratio
    tracesSamplerArg: "1.0"
    logJson: true
    resourceAttributes: ""
    collectorHttpHost: ""
    collectorHttpPort: "4318"
    collector:
      exporters:
        debug:
          verbosity: basic
      tracesExporters:
        - debug
        - otlphttp/victoriatraces
      metricsExporters:
        - debug
        - prometheusremotewrite
    metricsBackend:
      enabled: true
      storage:
        enabled: true
        size: 1Gi
        storageClassName: local-path
    tracesBackend:
      enabled: true
      retentionPeriod: 7d
      storage:
        enabled: true
        size: 1Gi
        storageClassName: local-path
  config:
    keycloakAudience: tertius-api
    keycloakIssuerUrl: http://keycloak.localhost/realms/tertius
    keycloakJwksUrlOverride: auto
    authCookieSecure: false
    authSessionIdleSeconds: 604800
    authSessionMaxSeconds: 2592000
    natsUrl: ""
    llmFileEditMaxContextFiles: 20
    llmFileEditMaxContextChars: 80000
    llmUserRateLimitPerMinute: 10
    llmTenantRateLimitPerMinute: 60
    llmTenantDailyTokenQuota: "3200000"
    llmUserDailyTokenQuota: "3200000"
    billingStreamName: TERTIUS_BILLING
    billingLlmUsageSubject: tertius.billing.usage.llm.tokens
    billingMaxBytes: 262144
    oidcIssuerUrl: http://localhost:8081/realms/tertius
  secret:
    create: true
    databaseUrl: ""
    valkeyUrl: redis://tertius-valkey:6379/0
    authSessionSecret: local-auth-session-secret-change-me

api:
  replicaCount: 1
  image:
    repository: localhost/tertius-api
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

compileJobs:
  runtimeClassName: ""
  maxReplicaCount: 1
  activeDeadlineSeconds: 720
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "4"
      memory: 8Gi
      ephemeral-storage: 4Gi

piAgent:
  runtimeClassName: ""
  auth:
    storage:
      storageClassName: local-path

ui:
  replicaCount: 1
  image:
    repository: localhost/tertius-ui
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

postgres:
  instances: 1
  appUserSecret:
    create: true
    password: tertius-local-password
  storage:
    size: 2Gi
    storageClass: local-path

keycloak:
  instances: 1
  hostname: http://keycloak.localhost
  adminHostname: http://keycloak.localhost
  database:
    instances: 1
    appUserSecret:
      create: true
      password: keycloak-local-password
    storage:
      size: 2Gi
      storageClass: local-path
  realmImport:
    enabled: true
    uiPublicClient: true
    uiDirectAccessGrantsEnabled: true
    smokeUser:
      enabled: true

cloudflared:
  enabled: false
  replicaCount: 1

valkey:
  dataStorage:
    enabled: true
    requestedSize: 1Gi
    className: local-path
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

nats:
  config:
    merge:
      max_payload: 33554432
    jetstream:
      fileStore:
        pvc:
          size: 1Gi
          storageClassName: local-path
  container:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
