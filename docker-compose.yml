services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
    environment:
      NATS_URL: nats://nats:4222
      COMPILE_STREAM_NAME: TERTIUS_COMPILE
      COMPILE_REQUEST_SUBJECT: tertius.compile.request
      COMPILE_RESULT_SUBJECT: tertius.compile.result
      COMPILE_WORKER_QUEUE: compile-workers
      COMPILE_RESULT_CONSUMER: compile-result-api
      COMPILE_REQUEST_MAX_BYTES: 8388608
      COMPILE_RESULT_MAX_BYTES: 33554432
      PI_AGENT_ENABLED: "true"
      PI_AGENT_PROVIDER: openai-codex
      PI_AGENT_MODEL: gpt-5.5
      PI_AGENT_MODEL_LABEL: GPT-5.5
      PI_AGENT_THINKING: high
      PI_AGENT_TIMEOUT_SECONDS: 480
      PI_AGENT_MAX_TURNS: 12
      PI_AGENT_MAX_TOOL_CALLS: 48
      PI_AGENT_ESTIMATED_OUTPUT_TOKENS: 65536
      PI_AGENT_STREAM_NAME: TERTIUS_PI_AGENT
      PI_AGENT_REQUEST_SUBJECT: tertius.pi.request
      PI_AGENT_RESULT_SUBJECT: tertius.pi.result
      PI_AGENT_WORKER_QUEUE: pi-agent-workers
      PI_AGENT_RESULT_CONSUMER: pi-agent-result-api
      PI_AGENT_ACK_WAIT_SECONDS: 90
      PI_AGENT_MAX_DELIVER: 2
      PI_AGENT_REQUEST_MAX_BYTES: 524288
      PI_AGENT_RESULT_MAX_BYTES: 524288
      PI_AGENT_STREAM_MAX_AGE_SECONDS: 86400
      PI_AGENT_STREAM_MAX_BYTES: 67108864
      LLM_FILE_EDIT_MAX_CONTEXT_FILES: ${LLM_FILE_EDIT_MAX_CONTEXT_FILES:-20}
      LLM_FILE_EDIT_MAX_CONTEXT_CHARS: ${LLM_FILE_EDIT_MAX_CONTEXT_CHARS:-80000}
      LLM_USER_RATE_LIMIT_PER_MINUTE: ${LLM_USER_RATE_LIMIT_PER_MINUTE:-10}
      LLM_TENANT_RATE_LIMIT_PER_MINUTE: ${LLM_TENANT_RATE_LIMIT_PER_MINUTE:-60}
      LLM_TENANT_DAILY_TOKEN_QUOTA: ${LLM_TENANT_DAILY_TOKEN_QUOTA:-3200000}
      LLM_USER_DAILY_TOKEN_QUOTA: ${LLM_USER_DAILY_TOKEN_QUOTA:-3200000}
      BILLING_STREAM_NAME: ${BILLING_STREAM_NAME:-TERTIUS_BILLING}
      BILLING_LLM_USAGE_SUBJECT: ${BILLING_LLM_USAGE_SUBJECT:-tertius.billing.usage.llm.tokens}
      BILLING_MAX_BYTES: ${BILLING_MAX_BYTES:-262144}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: tertius-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
      OTEL_RESOURCE_ATTRIBUTES: service.version=local,deployment.environment=local,container.name=backend
      OTEL_LOG_JSON: ${OTEL_LOG_JSON:-true}
      APP_DB_HOST: postgres
      APP_DB_NAME: tertius
      APP_DB_OWNER: tertius
      APP_DB_PASSWORD: tertius
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-local-auth-session-secret-change-me}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/tertius}
      KEYCLOAK_JWKS_URL_OVERRIDE: ${KEYCLOAK_JWKS_URL_OVERRIDE:-http://keycloak:8080/realms/tertius/protocol/openid-connect/certs}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - postgres
      - nats
      - otel-collector

  compile-job-runner:
    build: .
    command: sh -c "while true; do sh /app/server/start-compile-job.sh; sleep 2; done"
    volumes:
      - ./server:/app/server
    environment:
      NATS_URL: nats://nats:4222
      COMPILE_STREAM_NAME: TERTIUS_COMPILE
      COMPILE_REQUEST_SUBJECT: tertius.compile.request
      COMPILE_RESULT_SUBJECT: tertius.compile.result
      COMPILE_WORKER_QUEUE: compile-workers
      COMPILE_RESULT_MAX_BYTES: 33554432
      COMPILE_JOB_MODE: nats-only
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: tertius-compile-job
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-parentbased_traceidratio}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
      OTEL_RESOURCE_ATTRIBUTES: service.version=local,deployment.environment=local,container.name=compile-job-runner
      OTEL_LOG_JSON: ${OTEL_LOG_JSON:-true}
    depends_on:
      - nats
      - otel-collector

  pi-agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: pi-agent
    command: sh -c "while true; do sh /app/server/start-pi-agent-job.sh; sleep 2; done"
    user: "1000:1000"
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 1g
    cpus: 2.0
    environment:
      NATS_URL: nats://nats:4222
      PI_AGENT_PROVIDER: openai-codex
      PI_AGENT_MODEL: gpt-5.5
      PI_AGENT_THINKING: high
      PI_AGENT_TIMEOUT_SECONDS: 480
      PI_AGENT_MAX_TURNS: 12
      PI_AGENT_MAX_TOOL_CALLS: 48
      PI_AGENT_STREAM_NAME: TERTIUS_PI_AGENT
      PI_AGENT_REQUEST_SUBJECT: tertius.pi.request
      PI_AGENT_RESULT_SUBJECT: tertius.pi.result
      PI_AGENT_WORKER_QUEUE: pi-agent-workers
      PI_AGENT_ACK_WAIT_SECONDS: 90
      PI_AGENT_MAX_DELIVER: 2
      PI_AGENT_REQUEST_MAX_BYTES: 524288
      PI_AGENT_RESULT_MAX_BYTES: 524288
      PI_AGENT_STREAM_MAX_AGE_SECONDS: 86400
      PI_AGENT_STREAM_MAX_BYTES: 67108864
      PI_CODING_AGENT_DIR: /var/lib/pi-agent
      PI_SKIP_VERSION_CHECK: "1"
      PI_TELEMETRY: "0"
      HOME: /tmp/home
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICE_NAME: tertius-pi-agent
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - pi-agent-auth:/var/lib/pi-agent
    tmpfs:
      - /workspace:rw,noexec,nosuid,nodev,size=128m,mode=0700,uid=1000,gid=1000
      - /tmp:rw,noexec,nosuid,nodev,size=256m,mode=0700,uid=1000,gid=1000
      - /tmp/home:rw,noexec,nosuid,nodev,size=16m,mode=0700,uid=1000,gid=1000
    networks:
      - pi-agent-egress
    depends_on:
      - nats

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_OTEL_ENABLED=${VITE_OTEL_ENABLED:-true}
      - VITE_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${VITE_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://localhost:4318/v1/traces}
      - VITE_OTEL_SERVICE_NAME=tertius-ui
    depends_on:
      - otel-collector

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tertius
      POSTGRES_USER: tertius
      POSTGRES_PASSWORD: tertius
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - tertius-postgres:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./infra/keycloak/tertius-realm.json:/opt/keycloak/data/import/tertius-realm.json:ro

  nats:
    image: nats:2
    command:
      - -c
      - /etc/nats/nats-server.conf
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - tertius-nats:/data
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    networks:
      - default
      - pi-agent-egress

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./infra/otel/otel-collector-local.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - default
      - pi-agent-egress

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.129.1
    command:
      - -storageDataPath=/storage
      - -httpListenAddr=:8428
    ports:
      - "8428:8428"
    volumes:
      - tertius-victoriametrics:/storage

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.2
    command:
      - -storageDataPath=/storage
      - -httpListenAddr=:10428
      - -retentionPeriod=7d
    ports:
      - "10428:10428"
    volumes:
      - tertius-victoriatraces:/storage

  # Uncomment and configure the below block if you use a named Cloudflare tunnel with a token
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  tertius-postgres:
  tertius-nats:
  tertius-victoriametrics:
  tertius-victoriatraces:
  pi-agent-auth:

networks:
  pi-agent-egress:
