services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
      - ./artifacts:/tmp/tertius-artifacts

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5173:5173"
    command: /bin/sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tertius
      POSTGRES_USER: tertius
      POSTGRES_PASSWORD: tertius
    volumes:
      - tertius-postgres:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./infra/keycloak/tertius-realm.json:/opt/keycloak/data/import/tertius-realm.json:ro

  # Uncomment and configure the below block if you use a named Cloudflare tunnel with a token
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  tertius-postgres:
