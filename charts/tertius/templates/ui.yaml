apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tertius.uiName" . }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "tertius.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "tertius.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: {{ include "tertius.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.port }}
          envFrom:
            - configMapRef:
                name: {{ include "tertius.configName" . }}
            - secretRef:
                name: {{ include "tertius.secretName" . }}
                optional: true
          env:
            - name: API_SERVICE_HOST
              value: {{ include "tertius.apiName" . | quote }}
            - name: API_SERVICE_PORT
              value: {{ .Values.api.service.port | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tertius.uiName" . }}
  labels:
    {{- include "tertius.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
  selector:
    {{- include "tertius.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
