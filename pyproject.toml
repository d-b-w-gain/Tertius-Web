[tool.mypy]
# Type-check baseline for the Tertius-Web Python backend.
# Keep this minimal and pragmatic; tighten incrementally as gaps are filled.

python_version = "3.11"
# pytest.ini sets `pythonpath = server`, so packages are imported as `core.*`,
# `workflows.*`, etc. Mypy needs to know that the parent of those packages is
# `server/` and that the package roots don't carry an `__init__.py`.
mypy_path = ["server"]
explicit_package_bases = true
files = ["server", "extract_coords.py"]

# Pragmatic first pass — we're not enforcing typed definitions everywhere yet,
# but we want useful signal on the parts that *are* typed.
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
warn_return_any = true

# Many third-party libraries used here (build123d, py-lib3mf, etc.) either
# ship no stubs or are partially typed. Silence import resolution noise.
ignore_missing_imports = true

# Treat warnings as warnings, not errors — first pass is about visibility.
warn_unreachable = false

# Migrations emit autogenerated code with broad Any usage; skip it.
exclude = [
    "migrations/versions/",
    "__pycache__",
    ".venv",
    "dist",
    "cache",
    "artifacts",
    "ui",
]

# Tests benefit from a slightly looser policy: don't flag missing return types
# on fixtures or quick assertion helpers, but still check bodies.
[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
check_untyped_defs = true
warn_return_any = false

# Standalone scratch scripts at the repo root and under server/ root aren't
# part of the deployable backend. Because `server/` has no `__init__.py`, these
# resolve as top-level module names rather than `server.<name>`.
[[tool.mypy.overrides]]
module = [
    "test_draw",
    "test_svg",
    "extract_coords",
]
ignore_errors = true
