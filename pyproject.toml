[tool.mypy]
python_version = "3.11"
mypy_path = ["server"]
explicit_package_bases = true
files = ["server", "extract_coords.py"]

# build123d, py-lib3mf, etc. ship no stubs or are partially typed.
ignore_missing_imports = true

# Migrations emit autogenerated code with broad Any usage; skip it.
exclude = [
    "migrations/versions/",
    "__pycache__",
    ".venv",
    "dist",
    "cache",
    "artifacts",
    "ui",
]
