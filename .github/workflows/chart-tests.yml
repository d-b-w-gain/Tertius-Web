name: Deployment Chart Tests

on:
  pull_request:
    paths:
      - '.github/workflows/chart-tests.yml'
      - '.github/workflows/images.yml'
      - 'infra/charts/**'
      - 'infra/clusters/production/kustomization.yaml'
      - 'infra/clusters/production/flux-system/gitrepository.yaml'
      - 'scripts/promote_images.py'
      - 'scripts/test-deployment-config.sh'
      - 'scripts/test-k3s-deployment.sh'
      - 'scripts/check-runtime-parity.sh'
      - 'scripts/harness-*.sh'
      - 'scripts/smoke-http.sh'
      - 'scripts/smoke-live-flow.sh'
      - 'docker-compose.yml'
      - 'docker-compose.parity.yml'
      - 'infra/otel/**'
      - 'infra/deploy/nginx/**'
      - 'docs/harness/**'
      - 'scripts/bundle.py'
      - 'Dockerfile.api'
      - 'Dockerfile.ui'
      - 'ci/k3s-images.txt'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/chart-tests.yml'
      - '.github/workflows/images.yml'
      - 'infra/charts/**'
      - 'infra/clusters/production/kustomization.yaml'
      - 'infra/clusters/production/flux-system/gitrepository.yaml'
      - 'scripts/promote_images.py'
      - 'scripts/test-deployment-config.sh'
      - 'scripts/test-k3s-deployment.sh'
      - 'scripts/check-runtime-parity.sh'
      - 'scripts/harness-*.sh'
      - 'scripts/smoke-http.sh'
      - 'scripts/smoke-live-flow.sh'
      - 'docker-compose.yml'
      - 'docker-compose.parity.yml'
      - 'infra/otel/**'
      - 'infra/deploy/nginx/**'
      - 'docs/harness/**'
      - 'scripts/bundle.py'
      - 'Dockerfile.api'
      - 'Dockerfile.ui'
      - 'ci/k3s-images.txt'
  workflow_dispatch:
    inputs:
      run_k3s:
        description: Run the full k3s deployment test
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deployment-config-check:
    name: Chart render/config checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Make scripts executable
        run: chmod +x scripts/test-deployment-config.sh scripts/test-k3s-deployment.sh scripts/check-runtime-parity.sh scripts/harness-k3s.sh scripts/harness-compose.sh scripts/smoke-http.sh scripts/smoke-live-flow.sh scripts/harness-query-metrics.sh scripts/install-tertius-harness-skill.sh
      - name: Run config test script
        run: ./scripts/test-deployment-config.sh

  k3s-deployment-smoke:
    name: k3s deployment smoke
    runs-on: ubuntu-latest
    needs:
      - deployment-config-check
    timeout-minutes: 90
    if: |
      (github.event_name == 'pull_request' && github.head_ref != 'image-promotion') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_k3s == true)
    env:
      KUBECONFIG: /tmp/kubeconfig
      NAMESPACE: tertius-ci
      RELEASE_NAME: tertius-ci
      TIMEOUT: 6m
      KEDA_ENABLED: "true"
      BUILDX_GHA_CACHE: "true"
      CLEAN_LOCAL_IMAGES_AFTER_LOAD: "true"

      CI_CACHE_EPOCH: 2026-06-15-v1

      K3S_VERSION: v1.33.3+k3s1
      K3S_CACHE_VERSION: v1
      K3S_CACHE_DIR: .cache/k3s

      HELM_CACHE_VERSION: v1
      HELM_CACHE_HOME: ${{ github.workspace }}/.cache/helm/cache
      HELM_CONFIG_HOME: ${{ github.workspace }}/.cache/helm/config
      HELM_DATA_HOME: ${{ github.workspace }}/.cache/helm/data
      HELM_REPOSITORY_CACHE: ${{ github.workspace }}/.cache/helm/repository
      HELM_REPOSITORY_CONFIG: ${{ github.workspace }}/.cache/helm/repositories.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- k3s cache ----

      - name: Restore k3s cache
        id: cache-k3s
        uses: actions/cache@v4
        with:
          path: .cache/k3s
          key: >-
            k3s-${{ runner.os }}-${{ runner.arch }}-${{ env.K3S_VERSION }}-${{ env.CI_CACHE_EPOCH }}-${{ env.K3S_CACHE_VERSION }}

      - name: Download k3s artifacts
        if: steps.cache-k3s.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$K3S_CACHE_DIR"

          K3S_VERSION_URL="${K3S_VERSION/+/%2B}"

          curl -fsSL \
            -o "$K3S_CACHE_DIR/k3s" \
            "https://github.com/k3s-io/k3s/releases/download/${K3S_VERSION_URL}/k3s"

          curl -fsSL \
            -o "$K3S_CACHE_DIR/install.sh" \
            https://get.k3s.io

          chmod +x "$K3S_CACHE_DIR/k3s" "$K3S_CACHE_DIR/install.sh"

      - name: Validate k3s cache
        shell: bash
        run: |
          set -euxo pipefail

          test -x "$K3S_CACHE_DIR/k3s"
          test -x "$K3S_CACHE_DIR/install.sh"

          "$K3S_CACHE_DIR/k3s" --version | grep "$K3S_VERSION"

      # ---- Helm caches ----

      - name: Restore Helm repo cache
        uses: actions/cache@v4
        with:
          path: .cache/helm
          key: >-
            helm-repo-${{ runner.os }}-${{ env.CI_CACHE_EPOCH }}-${{ env.HELM_CACHE_VERSION }}-${{ hashFiles('infra/charts/**/Chart.lock', 'infra/charts/**/Chart.yaml') }}
          restore-keys: |
            helm-repo-${{ runner.os }}-${{ env.CI_CACHE_EPOCH }}-${{ env.HELM_CACHE_VERSION }}-
            helm-repo-${{ runner.os }}-${{ env.CI_CACHE_EPOCH }}-

      - name: Restore Helm chart dependency cache
        uses: actions/cache@v4
        with:
          path: |
            infra/charts/**/charts
          key: >-
            helm-chart-deps-${{ runner.os }}-${{ env.CI_CACHE_EPOCH }}-${{ env.HELM_CACHE_VERSION }}-${{ hashFiles('infra/charts/**/Chart.lock', 'infra/charts/**/Chart.yaml') }}

      - name: Prepare Helm cache directories
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p \
            "$HELM_CACHE_HOME" \
            "$HELM_CONFIG_HOME" \
            "$HELM_DATA_HOME" \
            "$HELM_REPOSITORY_CACHE"

      # ---- Tooling ----

      - name: Install tooling
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free runner disk before k3s
        shell: bash
        run: |
          set -euxo pipefail

          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune -af --volumes || true
          df -h

      # ---- Install k3s ----

      - name: Start k3s install timer
        shell: bash
        run: echo "K3S_INSTALL_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Install k3s
        shell: bash
        run: |
          set -euxo pipefail

          sudo install -m 0755 "$K3S_CACHE_DIR/k3s" /usr/local/bin/k3s

          for attempt in 1 2 3; do
            if sudo INSTALL_K3S_SKIP_DOWNLOAD=true \
              "$K3S_CACHE_DIR/install.sh" \
              --write-kubeconfig /tmp/kubeconfig --write-kubeconfig-mode 0644; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

          kubectl wait --for=condition=Ready node --all --timeout=90s

      - name: Report k3s install duration
        shell: bash
        run: |
          end="$(date +%s)"
          echo "k3s install duration: $((end - K3S_INSTALL_START))s"

      # ---- Operators ----

      - name: Install CloudNativePG operator
        shell: bash
        run: |
          set -euxo pipefail
          helm repo add cloudnativepg https://cloudnative-pg.github.io/charts
          helm repo update
          helm install cloudnativepg cloudnativepg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Install KEDA operator
        shell: bash
        run: |
          set -euxo pipefail
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm install keda kedacore/keda \
            --version 2.20.1 \
            --namespace keda \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Install Keycloak operator CRDs and controller
        shell: bash
        run: |
          set -euxo pipefail
          apply_remote_yaml() {
            local url="$1"
            local namespace="${2:-}"
            local attempt
            for attempt in 1 2 3 4 5; do
              if [ -n "$namespace" ]; then
                if kubectl -n "$namespace" apply -f "$url"; then
                  return 0
                fi
              elif kubectl apply -f "$url"; then
                return 0
              fi
              sleep $((attempt * 5))
            done
            if [ -n "$namespace" ]; then
              kubectl -n "$namespace" apply -f "$url"
            else
              kubectl apply -f "$url"
            fi
          }
          apply_remote_yaml https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.3/kubernetes/keycloaks.k8s.keycloak.org-v1.yml
          apply_remote_yaml https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.3/kubernetes/keycloakrealmimports.k8s.keycloak.org-v1.yml
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          apply_remote_yaml https://raw.githubusercontent.com/keycloak/keycloak-k8s-resources/26.6.3/kubernetes/kubernetes.yml "${NAMESPACE}"
          kubectl patch clusterrolebinding keycloak-operator-clusterrole-binding --type='json' -p="[{\"op\":\"replace\",\"path\":\"/subjects/0/namespace\",\"value\":\"${NAMESPACE}\"}]"
          kubectl -n "${NAMESPACE}" wait deploy keycloak-operator --for=condition=Available --timeout=90s

      # ---- Chart test ----

      - name: Make scripts executable
        run: chmod +x scripts/test-k3s-deployment.sh scripts/test-deployment-config.sh scripts/check-runtime-parity.sh scripts/harness-k3s.sh scripts/harness-compose.sh scripts/smoke-http.sh scripts/smoke-live-flow.sh scripts/harness-query-metrics.sh scripts/install-tertius-harness-skill.sh

      - name: Start chart test timer
        shell: bash
        run: echo "CHART_TEST_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run k3s chart test with cleanup
        shell: bash
        run: |
          set +e
          ./scripts/test-k3s-deployment.sh
          result=$?
          ./scripts/test-k3s-deployment.sh --cleanup --delete-data || true
          exit $result

      - name: Report chart test duration
        shell: bash
        run: |
          end="$(date +%s)"
          echo "chart test duration (incl deploy + smoke): $((end - CHART_TEST_START))s"
