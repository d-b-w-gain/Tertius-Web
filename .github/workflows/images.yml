name: Build Images

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build and push GHCR images
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image_tag=master-${GITHUB_RUN_NUMBER}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/d-b-w-gain/tertius-api:${{ steps.vars.outputs.image_tag }}
            ghcr.io/d-b-w-gain/tertius-api:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/d-b-w-gain/tertius-api:master
          cache-from: type=gha,scope=tertius-api
          cache-to: type=gha,mode=max,scope=tertius-api

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ui
          build-args: |
            VITE_API_URL=/api
            VITE_KEYCLOAK_AUTHORITY=/realms/tertius
            VITE_KEYCLOAK_CLIENT_ID=tertius-ui
          push: true
          tags: |
            ghcr.io/d-b-w-gain/tertius-ui:${{ steps.vars.outputs.image_tag }}
            ghcr.io/d-b-w-gain/tertius-ui:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/d-b-w-gain/tertius-ui:master
          cache-from: type=gha,scope=tertius-ui
          cache-to: type=gha,mode=max,scope=tertius-ui
