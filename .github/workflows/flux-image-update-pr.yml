name: Flux Image Update PR

on:
  push:
    branches:
      - flux-image-updates
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  image-update-pr:
    name: Create image update PR
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.FLUX_IMAGE_UPDATE_PAT }}
          HEAD_BRANCH: flux-image-updates
          BASE_BRANCH: master
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::FLUX_IMAGE_UPDATE_PAT is required so this workflow can create and auto-merge image update PRs."
            exit 1
          fi

          compare_json="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${BASE_BRANCH}...${HEAD_BRANCH}")"
          ahead_by="$(printf '%s\n' "${compare_json}" | jq -r '.ahead_by')"
          if [ "${ahead_by}" = "0" ]; then
            echo "No image update commits to promote from ${HEAD_BRANCH}."
            exit 0
          fi

          non_chart_changes="$(printf '%s\n' "${compare_json}" \
            | jq -r '.files[].filename' \
            | grep -v '^charts/tertius/values.yaml$' || true)"
          if [ -n "${non_chart_changes}" ]; then
            echo "${non_chart_changes}" >&2
            echo "::error::Flux image update branch contains changes outside charts/tertius/values.yaml; reset ${HEAD_BRANCH} before auto-merging."
            exit 1
          fi

          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${HEAD_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -z "${pr_number}" ]; then
            create_error="$(mktemp)"
            if ! pr_url="$(gh pr create \
                --repo "${GITHUB_REPOSITORY}" \
                --head "${HEAD_BRANCH}" \
                --base "${BASE_BRANCH}" \
                --title "chore: update deployed image tags" \
                --body "Flux image automation updated the deployed API/UI image tags." \
                2>"${create_error}")"; then
              cat "${create_error}" >&2
              echo "::error::Unable to create Flux image update PR automatically from ${HEAD_BRANCH}."
              exit 1
            fi
            rm -f "${create_error}"
            pr_number="${pr_url##*/}"
          fi

          if ! gh pr merge "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --auto \
              --merge; then
            echo "::error::Unable to enable auto-merge for Flux image update PR #${pr_number}."
            exit 1
          fi
