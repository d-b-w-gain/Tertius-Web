name: Flux Image Update PR

on:
  push:
    branches:
      - flux-image-updates
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  image-update-pr:
    name: Create image update PR
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: flux-image-updates
          BASE_BRANCH: master
        run: |
          set -euo pipefail

          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${HEAD_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [ -z "${pr_number}" ]; then
            create_error="$(mktemp)"
            if ! pr_url="$(gh pr create \
                --repo "${GITHUB_REPOSITORY}" \
                --head "${HEAD_BRANCH}" \
                --base "${BASE_BRANCH}" \
                --title "chore: update deployed image tags" \
                --body "Flux image automation updated the deployed API/UI image tags." \
                2>"${create_error}")"; then
              cat "${create_error}" >&2
              echo "::error::Unable to create Flux image update PR automatically from ${HEAD_BRANCH}."
              exit 1
            fi
            rm -f "${create_error}"
            pr_number="${pr_url##*/}"
          fi

          if ! gh pr merge "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --auto \
              --merge; then
            echo "::error::Unable to enable auto-merge for Flux image update PR #${pr_number}."
            exit 1
          fi
