name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui:
    name: UI lint and build
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/flux-image-updates' && (github.event_name != 'pull_request' || github.head_ref != 'flux-image-updates') }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Lint UI
        working-directory: ui
        run: npm run lint

      - name: Typecheck UI
        working-directory: ui
        run: npx tsc --noEmit

      - name: Build UI
        working-directory: ui
        run: npm run build

  python:
    name: Python tests
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/flux-image-updates' && (github.event_name != 'pull_request' || github.head_ref != 'flux-image-updates') }}
    timeout-minutes: 20
    env:
      UV_CACHE_DIR: .uv-cache
      POSTGRES_TEST_IMAGE: postgres:18
      TESTCONTAINERS_RYUK_DISABLED: "true"
      DOCKER_CLIENT_TIMEOUT: "300"
      TESTCONTAINERS_DOCKER_CONTAINER_CREATE_TIMEOUT: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        run: python -m pip install --upgrade pip uv

      - name: Create Python virtualenv
        run: uv venv --python python

      - name: Install Python dependencies
        run: uv pip install -r server/requirements.txt

      - name: Run Python type checks
        run: uv run mypy

      - name: Run Python tests
        run: uv run pytest
